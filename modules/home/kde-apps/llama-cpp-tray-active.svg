<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <style type="text/css" id="current-color-scheme">
    .ColorScheme-Text { color: #232629; }
  </style>
  <g class="ColorScheme-Text" fill="currentColor">
    <!-- Robot head -->
    <rect x="3" y="5" width="16" height="12" rx="2.5" ry="2.5"
          fill="none" stroke="currentColor" stroke-width="1.5"/>
    <!-- Antenna stem -->
    <line x1="11" y1="5" x2="11" y2="2.5"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Antenna tip -->
    <circle cx="11" cy="1.8" r="1"/>
    <!-- Eyes (fully lit when active) -->
    <circle cx="8"  cy="11" r="1.8"/>
    <circle cx="14" cy="11" r="1.8"/>
    <!-- Mouth -->
    <rect x="7.5" y="14" width="7" height="1.5" rx="0.75"/>
  </g>
  <!-- Green status dot — oxocarbon green #42be65 -->
  <circle cx="18.5" cy="18.5" r="3" fill="#42be65"/>
</svg>
