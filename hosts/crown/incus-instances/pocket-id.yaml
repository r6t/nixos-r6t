config:
  security.nesting: "true"
  user.user-data: |
    #cloud-config
    datasource_list: [NoCloud, None]
description: pocket-id
devices:
  eth0:
    name: eth0
    nictype: bridged
    parent: br1
    type: nic
  pid-port:
    connect: tcp:127.0.0.1:1411
    listen: tcp:0.0.0.0:1411
    type: proxy
  pocket-id-storage:
    path: /var/lib/pocket-id
    shift: "true"
    source: /mnt/crownstore/app-storage/pocket-id
    type: disk
  root:
    path: /
    pool: default
    type: disk
  seed-meta-data:
    path: /var/lib/cloud/seed/nocloud/meta-data
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/pocket-id.meta-data
    type: disk
  seed-network-config:
    path: /var/lib/cloud/seed/nocloud/network-config
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/pocket-id.network-config
    type: disk
  seed-user-data:
    path: /var/lib/cloud/seed/nocloud/user-data
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/pocket-id.user-data
    type: disk
name: pocket-id
