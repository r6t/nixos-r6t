config:
  security.nesting: "true"
  user.user-data: |
    #cloud-config
    datasource_list: [NoCloud, None]
description: ntfy
devices:
  eth0:
    name: eth0
    nictype: bridged
    parent: br1
    type: nic
  mollysocket-data:
    path: /var/lib/private/mollysocket
    shift: "true"
    source: /mnt/crownstore/app-storage/mollysocket
    type: disk
  mollysocket-port:
    connect: tcp:127.0.0.1:8020
    listen: tcp:0.0.0.0:8020
    type: proxy
  ntfy-data:
    path: /var/lib/private/ntfy-sh
    shift: "true"
    source: /mnt/crownstore/app-storage/ntfy-sh
    type: disk
  ntfy-port:
    connect: tcp:127.0.0.1:8083
    listen: tcp:0.0.0.0:8083
    type: proxy
  root:
    path: /
    pool: default
    type: disk
  seed-meta-data:
    path: /var/lib/cloud/seed/nocloud/meta-data
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/ntfy.meta-data
    type: disk
  seed-network-config:
    path: /var/lib/cloud/seed/nocloud/network-config
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/ntfy.network-config
    type: disk
  seed-user-data:
    path: /var/lib/cloud/seed/nocloud/user-data
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/ntfy.user-data
    type: disk
name: ntfy
