config:
  limits.memory: 60GiB
  security.nesting: "true"
  user.user-data: |
    #cloud-config
    datasource_list: [NoCloud, None]
description: llm
devices:
  eth0:
    name: eth0
    nictype: bridged
    parent: br1
    type: nic
  # AMD Radeon AI Pro R9700 32GB passthrough (RDNA 4 / GFX1201).
  # `gputype: physical` with `pci:` filter exposes ONLY this GPU's
  # /dev/dri/card* and /dev/dri/renderD* into the container (gid=303).
  # Crown also has the Ryzen Phoenix iGPU (HawkPoint, 0000:ca:00.0) — the
  # pci filter is essential to keep it out of the container so ROCm only
  # sees the R9700.
  gpu:
    gid: "303"
    gputype: physical
    pci: 0000:0e:00.0
    type: gpu
  # /dev/kfd (AMD Kernel Fusion Driver) is a single host-wide char device that
  # ROCm requires for compute. It is NOT exposed by `gputype: physical`, which
  # only handles per-GPU DRM nodes. Pass it through explicitly as a unix-char.
  kfd:
    path: /dev/kfd
    source: /dev/kfd
    type: unix-char

  llama-cpp-cache:
    path: /var/cache/private/llama-cpp
    shift: "true"
    source: /mnt/crownstore/app-storage/llama-cpp-cache
    type: disk
  llama-cpp-data:
    path: /var/lib/private/llama-cpp
    shift: "true"
    source: /mnt/crownstore/app-storage/llama-cpp
    type: disk
  llama-server-port:
    connect: tcp:127.0.0.1:8080
    listen: tcp:0.0.0.0:8088
    type: proxy
  oi-port:
    connect: tcp:127.0.0.1:8087
    listen: tcp:0.0.0.0:8087
    type: proxy
  open-webui-data:
    path: /var/lib/private/open-webui
    shift: "true"
    source: /mnt/crownstore/app-storage/open-webui
    type: disk
  open-webui-env:
    path: /etc/oi.env
    readonly: "true"
    source: /mnt/crownstore/Sync/app-config/open-webui/oi.env
    type: disk
  root:
    path: /
    pool: default
    type: disk
  seed-meta-data:
    path: /var/lib/cloud/seed/nocloud/meta-data
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/llm.meta-data
    type: disk
  seed-network-config:
    path: /var/lib/cloud/seed/nocloud/network-config
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/llm.network-config
    type: disk
  seed-user-data:
    path: /var/lib/cloud/seed/nocloud/user-data
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/llm.user-data
    type: disk
name: llm
