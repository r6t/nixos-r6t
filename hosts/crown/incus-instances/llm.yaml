config:
  limits.memory: 60GiB
  security.nesting: "true"
  user.user-data: |
    #cloud-config
    datasource_list: [NoCloud, None]
description: llm
devices:
  eth0:
    name: eth0
    nictype: bridged
    parent: br1
    type: nic
  gpu:
    gid: "303"
    gputype: physical
    pci: 0000:0c:00.0
    type: gpu
  nvidia-uvm:
    path: /dev/nvidia-uvm
    source: /dev/nvidia-uvm
    type: unix-char
  nvidia-uvm-tools:
    path: /dev/nvidia-uvm-tools
    source: /dev/nvidia-uvm-tools
    type: unix-char

  llama-cpp-cache:
    path: /var/cache/private/llama-cpp
    shift: "true"
    source: /mnt/crownstore/app-storage/llama-cpp-cache
    type: disk
  llama-cpp-data:
    path: /var/lib/private/llama-cpp
    shift: "true"
    source: /mnt/crownstore/app-storage/llama-cpp
    type: disk
  llama-server-port:
    connect: tcp:127.0.0.1:8080
    listen: tcp:0.0.0.0:8088
    type: proxy
  oi-port:
    connect: tcp:127.0.0.1:8087
    listen: tcp:0.0.0.0:8087
    type: proxy
  open-webui-data:
    path: /var/lib/private/open-webui
    shift: "true"
    source: /mnt/crownstore/app-storage/open-webui
    type: disk
  open-webui-env:
    path: /etc/oi.env
    readonly: "true"
    source: /mnt/crownstore/Sync/app-config/open-webui/oi.env
    type: disk
  root:
    path: /
    pool: default
    type: disk
  seed-meta-data:
    path: /var/lib/cloud/seed/nocloud/meta-data
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/llm.meta-data
    type: disk
  seed-network-config:
    path: /var/lib/cloud/seed/nocloud/network-config
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/llm.network-config
    type: disk
  seed-user-data:
    path: /var/lib/cloud/seed/nocloud/user-data
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/llm.user-data
    type: disk
name: llm
