config:
  security.nesting: "true"
  user.user-data: |
    #cloud-config
    datasource_list: [NoCloud, None]
description: mv-oslo
devices:
  eth0:
    name: eth0
    nictype: physical
    parent: exit2
    type: nic
  root:
    path: /
    pool: default
    type: disk
  seed-meta-data:
    path: /var/lib/cloud/seed/nocloud/meta-data
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/mv-oslo.meta-data
    type: disk
  seed-network-config:
    path: /var/lib/cloud/seed/nocloud/network-config
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/mv-oslo.network-config
    type: disk
  seed-user-data:
    path: /var/lib/cloud/seed/nocloud/user-data
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/mv-oslo.user-data
    type: disk
  wireguard-conf:
    path: /etc/wireguard/wg0.conf
    shift: "true"
    source: /mnt/crownstore/Sync/app-config/wireguard/no-osl.conf
    type: disk
  tailscale-auth:
    path: /etc/tailscale/auth-key
    shift: "true"
    source: /mnt/crownstore/Sync/app-config/tailscale/exit-node-auth-key
    type: disk
name: mv-oslo
