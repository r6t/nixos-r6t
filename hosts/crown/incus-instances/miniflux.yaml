config:
  security.nesting: "true"
  user.user-data: |
    #cloud-config
    datasource_list: [NoCloud, None]
description: miniflux
devices:
  eth0:
    name: eth0
    nictype: bridged
    parent: br1
    type: nic
  miniflux-config:
    path: /var/lib/postgresql/data
    shift: "true"
    source: /mnt/crownstore/config/miniflux/db
    type: disk
  miniflux-env:
    path: /var/lib/miniflux/env
    shift: "true"
    source: /mnt/crownstore/config/miniflux/env
    type: disk
  miniflux-port:
    connect: tcp:127.0.0.1:8080
    listen: tcp:0.0.0.0:8080
    type: proxy
  root:
    path: /
    pool: default
    type: disk
  seed-meta-data:
    path: /var/lib/cloud/seed/nocloud/meta-data
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/miniflux.meta-data
    type: disk
  seed-network-config:
    path: /var/lib/cloud/seed/nocloud/network-config
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/miniflux.network-config
    type: disk
  seed-user-data:
    path: /var/lib/cloud/seed/nocloud/user-data
    source: /home/r6t/git/nixos-r6t/hosts/crown/incus-instances/seed/miniflux.user-data
    type: disk
name: miniflux
